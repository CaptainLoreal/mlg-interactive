<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MLG Banner</title>
  <style>
    @font-face {
      font-family: "Aptos Narrow";
      src: url("file:///Users/jan-niclaswilken/Documents/areas/MLG/Website/MLG%20efficient/design_handoff_mlg_design_system/source/fonts/Aptos-Narrow.ttf") format("truetype");
      font-weight: 400 500;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Aptos Narrow";
      src: url("file:///Users/jan-niclaswilken/Documents/areas/MLG/Website/MLG%20efficient/design_handoff_mlg_design_system/source/fonts/Aptos-Narrow-Bold.ttf") format("truetype");
      font-weight: 600 700;
      font-style: normal;
      font-display: block;
    }

    :root {
      --mlg-red: #B50034;
      --paper: #FFFFFF;
      --ink-900: #000000;
      --font-sans: "Aptos Narrow", "Aptos", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;

      /* Banner physical size: 850mm × 2000mm.
         Render at 850px × 2000px (1mm = 1px in HTML);
         we'll capture at deviceScaleFactor=3.55 → 3017×7100 px.
         Final print PNG will be upscaled to 10039×23622 (300dpi) on save. */
      --bw: 850px;
      --bh: 2000px;
    }

    html, body { margin: 0; padding: 0; }
    body {
      width: var(--bw);
      height: var(--bh);
      font-family: var(--font-sans);
      color: #fff;
      background: #000;
      overflow: hidden;
    }

    .banner {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Full-bleed hero photo */
    .banner__photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
    }

    /* Top + bottom dark scrim for legibility */
    .banner__scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(to bottom, #000 0%, rgba(0,0,0,0) 20%),
        linear-gradient(to top,    #000 0%, rgba(0,0,0,0.85) 35%, rgba(0,0,0,0) 70%);
    }

    /* Top — logo */
    .banner__top {
      position: absolute;
      top: 50px;
      left: 60px;
      z-index: 2;
    }
    .banner__logo {
      width: 360px;
      height: auto;
      display: block;
    }

    /* Bottom block — eyebrow, headline, sub, bullets */
    .banner__bottom {
      position: absolute;
      left: 60px;
      right: 60px;
      bottom: 220px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .eyebrow {
      display: inline-block;
      background: var(--mlg-red);
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 999px;
      width: fit-content;
      line-height: 1;
      margin: 0 0 26px;
    }

    .display {
      font-family: var(--font-sans);
      font-size: 96px;
      font-weight: 500;
      letter-spacing: -0.005em;
      line-height: 1.02;
      color: var(--paper);
      margin: 0;
      text-transform: uppercase;
    }

    .display--sub {
      font-size: 44px;
      font-weight: 450;
      letter-spacing: 0;
      line-height: 1.3;
      text-transform: none;
      color: rgba(255,255,255,0.92);
      margin: 32px 0 0;
    }

    .services {
      list-style: none;
      padding: 0;
      margin: 52px 0 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .services li {
      position: relative;
      padding-left: 30px;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.25;
      color: rgba(255,255,255,0.96);
    }
    .services li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--mlg-red);
    }

    /* Bottom-right — 3-step triangle mark */
    .banner__mark {
      position: absolute;
      right: 60px;
      bottom: 70px;
      width: 140px;
      height: auto;
      z-index: 2;
      display: block;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img class="banner__photo" src="file:///Users/jan-niclaswilken/Documents/areas/MLG/Website/MLG%20interactive/site/assets/photos/red-10.webp" alt="" />
    <div class="banner__scrim"></div>

    <!-- Top: real logo SVG (all white) -->
    <div class="banner__top">
      <img class="banner__logo"
           src="file:///Users/jan-niclaswilken/Documents/areas/MLG/Website/MLG%20interactive/site/assets/logo-white.svg" alt="MLG" />
    </div>

    <!-- Bottom: eyebrow + headline + sub + services bullets -->
    <div class="banner__bottom">
      <p class="eyebrow">Munich Leadership Group</p>
      <h1 class="display">Empowering<br>leadership</h1>
      <p class="display--sub">Developing leaders<br>who shape organizations.</p>
      <ul class="services">
        <li>Leadership Development</li>
        <li>Sparring &amp; Coaching</li>
        <li>Audits &amp; Assessments</li>
        <li>Cultural Transformation</li>
      </ul>
    </div>

    <!-- Bottom-right: 3-step triangle mark, all RED -->
    <svg class="banner__mark" viewBox="236 0 67 65" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M302.059,64.913L293.891,8.134L236.69,0.066L302.059,0.066L302.059,64.913Z" fill="#B50034"/>
      <path d="M287.625,64.906L281.26,20.665L236.69,14.375L287.625,14.375L287.625,64.906Z" fill="#B50034"/>
      <path d="M274.971,64.942L270.186,31.681L236.685,26.958L274.971,26.958L274.971,64.942Z" fill="#B50034"/>
    </svg>
  </div>
</body>
</html>
