<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f10" />
  <title>Services — Munich Leadership Group</title>
  <link rel="stylesheet" href="styles.css?v=65" />
</head>
<body>
  <main class="standalone">
    <!-- Top corner brand -->
    <div class="topbar">
      <a class="topbar__logo" href="index.html" aria-label="Munich Leadership Group — back to home">
        <img src="assets/logo-white.svg" alt="Munich Leadership Group" />
      </a>
    </div>

    <!-- Bottom-right mark -->
    <span class="corner-mark" aria-hidden="true">
      <svg class="mark__path mark__path--1" viewBox="236 0 67 65"><path d="M302.059,64.913L293.891,8.134L236.69,0.066L302.059,0.066L302.059,64.913Z" fill="currentColor"/></svg>
      <svg class="mark__path mark__path--2" viewBox="236 0 67 65"><path d="M287.625,64.906L281.26,20.665L236.69,14.375L287.625,14.375L287.625,64.906Z" fill="currentColor"/></svg>
      <svg class="mark__path mark__path--3" viewBox="236 0 67 65"><path d="M274.971,64.942L270.186,31.681L236.685,26.958L274.971,26.958L274.971,64.942Z" fill="#b50034"/></svg>
    </span>

    <!-- Page content uses the same .slide visual treatment as the deck -->
    <article class="slide slide--cards is-active" data-anim="parallax" data-title="Services">
      <div class="slide__media slide__media--soft">
        <img src="assets/photos/photo-16.png" alt="" />
      </div>
      <div class="slide__scrim slide__scrim--strong"></div>

      <div class="slide__copy slide__copy--top">
        <a class="page-back" href="index.html#slide=2">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>back</span>
        </a>
        <p class="eyebrow">Services</p>
        <h1 class="display">What we do for you.</h1>
      </div>

      <div class="cards-row">
        <div class="card-item">
          <h3 class="card-item__title">Leadership development</h3>
        </div>
        <div class="card-item">
          <h3 class="card-item__title">Coaching &amp; sparring</h3>
        </div>
        <div class="card-item">
          <h3 class="card-item__title">Audits &amp; assessments</h3>
        </div>
        <div class="card-item">
          <h3 class="card-item__title">Cultural transformation</h3>
        </div>
      </div>
    </article>
  </main>

  <script>
    // Animate the page out to the right before navigating back.
    document.querySelectorAll('.page-back').forEach((a) => {
      a.addEventListener('click', (e) => {
        const href = a.getAttribute('href');
        if (!href) return;
        e.preventDefault();
        document.querySelector('.standalone').classList.add('is-leaving');
        setTimeout(() => { location.href = href; }, 320);
      });
    });
  </script>
</body>
</html>
